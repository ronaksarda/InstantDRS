<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstantDRS | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-pink: #db2777; --p-slate: #0f172a; }
        body { font-family: 'Outfit', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-gold { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); position: relative; overflow: hidden; }
        .card-gold::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent); }
        .pulse-red { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .scanline { position: fixed; inset: 0; height: 1px; background: rgba(219, 39, 119, 0.03); animation: scan 8s linear infinite; pointer-events: none; z-index: 100; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .system-log { font-family: 'monospace'; font-size: 9px; line-height: 1.4; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="scanline"></div>

    <nav
        class="p-5 flex justify-between items-center sticky top-0 z-50 bg-slate-950/90 backdrop-blur-xl border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black uppercase tracking-tighter">Instant<span class="text-pink-600">DRS</span>
                Dispatch</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                <span id="connection-status" class="text-green-500">● Connecting...</span>
            </p>
        </div>
        <div class="flex gap-2 items-center flex-wrap">
            <span id="live-count"
                class="px-3 py-1.5 bg-pink-600/20 text-pink-500 rounded-full text-[10px] font-black uppercase tracking-widest">0</span>
            <button id="enable-siren"
                class="px-4 py-2 bg-slate-800 hover:bg-pink-600 rounded-full text-[10px] font-black uppercase transition-all tracking-widest">
                🔊 Siren
            </button>
            <a href="/logout"
                class="px-4 py-2 bg-slate-800 hover:bg-red-600 rounded-full text-[10px] font-black uppercase transition-all tracking-widest">
                Logout
            </a>
        </div>
    </nav>

    <div id="stats-bar" class="px-6 py-3 grid grid-cols-4 gap-3 border-b border-white/5">
        <div class="text-center group cursor-pointer hover:bg-white/5 p-2 rounded-2xl transition-all">
            <div id="stat-total" class="text-2xl font-black text-pink-500">0</div>
            <div
                class="text-[9px] font-bold text-slate-600 uppercase tracking-widest group-hover:text-pink-400 transition-colors">
                Total Reports</div>
        </div>
        <div class="text-center group cursor-pointer hover:bg-white/5 p-2 rounded-2xl transition-all">
            <div id="stat-active" class="text-2xl font-black text-cyan-400">0</div>
            <div
                class="text-[9px] font-bold text-slate-600 uppercase tracking-widest group-hover:text-cyan-400 transition-colors">
                Active Now</div>
        </div>
        <div class="text-center group cursor-pointer hover:bg-white/5 p-2 rounded-2xl transition-all">
            <div id="stat-critical" class="text-2xl font-black text-red-500">0</div>
            <div
                class="text-[9px] font-bold text-slate-600 uppercase tracking-widest group-hover:text-red-400 transition-colors">
                Critical (9+)</div>
        </div>
        <div class="text-center group cursor-pointer hover:bg-white/5 p-2 rounded-2xl transition-all">
            <div id="stat-avg" class="text-2xl font-black text-amber-400">0</div>
            <div
                class="text-[9px] font-bold text-slate-600 uppercase tracking-widest group-hover:text-amber-400 transition-colors">
                Avg Severity</div>
        </div>
    </div>

    <div class="px-6 py-4 grid grid-cols-1 lg:grid-cols-3 gap-4 border-b border-white/5 bg-slate-900/30">
        <div class="bg-slate-900/50 p-4 rounded-3xl border border-white/5 h-48">
            <canvas id="severityChart"></canvas>
        </div>
        <div class="bg-slate-900/50 p-4 rounded-3xl border border-white/5 h-48">
            <canvas id="typeChart"></canvas>
        </div>
        <!-- SYSTEM LOG -->
        <div class="bg-slate-900/50 p-5 rounded-3xl border border-white/5 h-48 flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    System Activity Log
                </h2>
            </div>
            <div id="log-content" class="flex-1 system-log overflow-y-auto text-slate-500 space-y-1 custom-scrollbar">
                <div class="text-green-500/70">>> InstantDRS Kernel v1.0.4 Online</div>
                <div class="text-cyan-500/70">>> C++ Priority Engine Ready (O(N log N))</div>
            </div>
        </div>
    </div>

    <div
        class="px-6 pt-4 pb-2 flex flex-wrap gap-3 items-center sticky top-[73px] z-40 bg-slate-950/90 backdrop-blur-xl border-b border-white/5">
        <input id="search-bar" type="text" placeholder="Search incidents..."
            class="flex-1 min-w-[180px] px-4 py-2 bg-slate-900 rounded-full text-sm outline-none focus:ring-2 focus:ring-pink-600 placeholder:text-slate-600" />
        <select id="filter-severity"
            class="px-3 py-2 bg-slate-900 rounded-full text-[10px] font-black uppercase tracking-widest outline-none cursor-pointer">
            <option value="all">All Severity</option>
            <option value="high">High (8-10)</option>
            <option value="mid">Medium (4-7)</option>
            <option value="low">Low (1-3)</option>
        </select>
        <select id="filter-type"
            class="px-3 py-2 bg-slate-900 rounded-full text-[10px] font-black uppercase tracking-widest outline-none cursor-pointer">
            <option value="all">All Types</option>
            <option value="Fire">🔥 Fire</option>
            <option value="Medical">🏥 Medical</option>
            <option value="Violence">⚠️ Violence</option>
            <option value="Flood">🌊 Flood</option>
            <option value="Accident">💥 Accident</option>
            <option value="Other">📋 Other</option>
        </select>
    </div>

    <div class="px-6 pt-4 flex gap-2">
        <button id="tab-active" onclick="switchTab('active')"
            class="px-5 py-2 bg-pink-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest transition-all">
            🔴 Active
        </button>
        <button id="tab-handled" onclick="switchTab('handled')"
            class="px-5 py-2 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">
            ✅ Resolved Cases
        </button>
    </div>

    <main class="p-6">
        <div id="incidents-grid" class="grid gap-5 grid-cols-1 md:grid-cols-2 xl:grid-cols-3">
            <div
                class="p-16 text-center text-slate-700 font-black uppercase tracking-widest border-4 border-dashed border-slate-900 rounded-[2rem] col-span-full">
                <div class="text-4xl mb-4">📡</div>
                Waiting for dispatch signals...
            </div>
        </div>
        <div id="handled-grid" class="hidden grid gap-5 grid-cols-1 md:grid-cols-2 xl:grid-cols-3"></div>
    </main>

    <script>
        const grid = document.getElementById('incidents-grid');
        const sirenBtn = document.getElementById('enable-siren');
        const liveCount = document.getElementById('live-count');
        const searchBar = document.getElementById('search-bar');
        const filterSeverity = document.getElementById('filter-severity');
        const filterType = document.getElementById('filter-type');
        const connStatus = document.getElementById('connection-status');
        const handledGrid = document.getElementById('handled-grid');
        const tabActive = document.getElementById('tab-active');
        const tabHandled = document.getElementById('tab-handled');
        let audioCtx = null;
        let sirenEnabled = false;
        let allIncidents = [];
        let resolvedIncidents = [];
        let acknowledged = JSON.parse(localStorage.getItem('ack_ids') || '[]');
        let currentTab = 'active';

        // Bind functions to window immediately for HTML onclick handlers
        window.switchTab = (tab) => switchTab(tab);
        window.acknowledgeIncident = (id) => acknowledgeIncident(id);
        window.resolveIncident = (id) => resolveIncident(id);
        let severityChart = null;
        let typeChart = null;

        function initCharts() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { ticks: { color: '#475569', font: { size: 8, family: 'Outfit', weight: 'bold' } } }
                }
            };

            severityChart = new Chart(document.getElementById('severityChart'), {
                type: 'bar',
                data: {
                    labels: ['S1', 'S2', 'S3', 'S4', 'S5', 'S6', 'S7', 'S8', 'S9', 'S10'],
                    datasets: [{
                        label: 'Severity Distribution',
                        data: new Array(10).fill(0),
                        backgroundColor: '#db2777',
                        borderRadius: 8
                    }]
                },
                options: commonOptions
            });

            typeChart = new Chart(document.getElementById('typeChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Fire', 'Medical', 'Violence', 'Flood', 'Accident', 'Other'],
                    datasets: [{
                        data: new Array(6).fill(0),
                        backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#06b6d4', '#8b5cf6', '#64748b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: { ...commonOptions, plugins: { legend: { display: true, position: 'right', labels: { color: '#94a3b8', font: { size: 8, weight: 'bold' } } } } }
            });
        }

        function updateCharts() {
            if (!severityChart || !typeChart) return;

            const sevData = new Array(10).fill(0);
            allIncidents.forEach(inc => {
                const s = Math.min(10, Math.max(1, inc.severity));
                sevData[s - 1]++;
            });
            severityChart.data.datasets[0].data = sevData;
            severityChart.update();

            const types = ['Fire', 'Medical', 'Violence', 'Flood', 'Accident', 'Other'];
            const typeData = new Array(6).fill(0);
            allIncidents.forEach(inc => {
                const idx = types.indexOf(inc.type);
                if (idx !== -1) typeData[idx]++;
            });
            typeChart.data.datasets[0].data = typeData;
            typeChart.update();
        }

        sirenBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sirenEnabled = true;
            sirenBtn.textContent = "🔊 Armed";
            sirenBtn.classList.replace('bg-slate-800', 'bg-green-600');
        });

        function playSiren() {
            if (!audioCtx || !sirenEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.8);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        function severityColor(sev) {
            if (sev >= 9) return 'bg-red-600';
            if (sev >= 7) return 'bg-orange-500';
            if (sev >= 5) return 'bg-yellow-500 text-black';
            return 'bg-green-600';
        }

        function getMapUrl(inc) {
            if (inc.lat && inc.lng && (inc.lat !== 0 || inc.lng !== 0))
                return `https://www.google.com/maps/search/?api=1&query=${inc.lat},${inc.lng}`;
            return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(inc.location_text || 'unknown')}`;
        }

        function timeAgo(ts) {
            const diff = Math.floor(Date.now() / 1000 - ts);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            return `${Math.floor(diff / 3600)}h ago`;
        }

        function filterIncidents() {
            const q = searchBar.value.toLowerCase();
            const sevFilter = filterSeverity.value;
            const typeFilter = filterType.value;
            return allIncidents.filter(inc => {
                const haystack = `${inc.text} ${inc.type} ${inc.location_text} ${inc.summary}`.toLowerCase();
                if (q && !haystack.includes(q)) return false;
                if (typeFilter !== 'all' && inc.type !== typeFilter) return false;
                if (sevFilter === 'high' && inc.severity < 8) return false;
                if (sevFilter === 'mid' && (inc.severity < 4 || inc.severity > 7)) return false;
                if (sevFilter === 'low' && inc.severity > 3) return false;
                return true;
            });
        }

        function acknowledgeIncident(id) {
            if (!acknowledged.includes(id)) {
                acknowledged.push(id);
                localStorage.setItem('ack_ids', JSON.stringify(acknowledged));
            }
            renderFiltered();
        }

        async function resolveIncident(id) {
            console.log("Resolving incident:", id);
            try {
                const res = await fetch('/api/resolve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                if (res.ok) {
                    console.log("Incident resolved on server:", id);
                    acknowledgeIncident(id);
                } else {
                    console.error("Failed to resolve incident:", await res.text());
                    alert("Failed to resolve incident. Check console or login status.");
                }
            } catch (e) { 
                console.error("Resolve error:", e);
            }
        }

        function updateStats(data) {
            const stats = data.stats || {};
            document.getElementById('stat-total').textContent = stats.total_received || 0;
            document.getElementById('stat-active').textContent = stats.active_count || allIncidents.length;
            document.getElementById('stat-critical').textContent = stats.critical_count || 0;
            document.getElementById('stat-avg').textContent = stats.avg_severity || 0;
        }

        function addLog(msg, color = 'slate-500') {
            const log = document.getElementById('log-content');
            const entry = document.createElement('div');
            entry.className = `text-${color}/70`;
            entry.textContent = `>> [${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(entry);
            if (log.childNodes.length > 50) log.lastChild.remove();
        }

        function renderCard(inc, opts = {}) {
            const card = document.createElement('div');
            const isAck = acknowledged.includes(inc.id);
            const isGold = inc.severity === 10;
            const isHandled = opts.handled || false;

            let cls = 'p-5 rounded-[2rem] bg-slate-900 border-2 transition-all ';
            if (isHandled) cls += 'border-green-600/30';
            else if (isAck) cls += 'border-green-600/40 opacity-60';
            else if (isGold) cls += 'card-gold border-amber-500 pulse-red';
            else if (opts.isTop) cls += 'border-pink-600 ring-2 ring-pink-600/30';
            else cls += 'border-slate-800 hover:border-slate-600';
            card.className = cls;

            const locationStr = inc.location_text || (inc.lat && inc.lng ? `${Number(inc.lat).toFixed(3)}, ${Number(inc.lng).toFixed(3)}` : 'Unknown');
            const photo = inc.image_url ? `<img src="${inc.image_url}" class="w-full rounded-xl mb-3 max-h-44 object-cover border border-white/5" />` : '';
            const videoPlayer = inc.video_url ? `<video controls src="${inc.video_url}" class="w-full rounded-xl mb-3 max-h-44 object-cover border border-white/5"></video>` : '';
            const audioPlayer = inc.audio_url ? `<audio controls src="${inc.audio_url}" class="w-full mb-3 h-8 rounded-full outline-none" style="filter: invert(0.9) hue-rotate(180deg);"></audio>` : '';

            const sevBadge = isGold
                ? `<span class="sev-badge px-3 py-1 bg-gradient-to-r from-amber-500 to-yellow-500 text-black rounded-full text-[10px] font-black uppercase tracking-widest">⚡ CRITICAL</span>`
                : isHandled
                    ? `<span class="px-3 py-1 bg-green-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest">✓ RESOLVED</span>`
                    : `<span class="sev-badge px-3 py-1 ${severityColor(inc.severity)} text-white rounded-full text-[10px] font-black uppercase tracking-widest">SEV ${inc.severity}/10</span>`;

            const actions = isHandled ? '' : `
                <div class="flex gap-2 mt-3">
                    <a href="${getMapUrl(inc)}" target="_blank" class="flex-1 py-2.5 ${isGold ? 'bg-amber-500 hover:bg-amber-600 text-black' : 'bg-pink-600 hover:bg-pink-700'} text-center rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">
                        📍 Locate
                    </a>
                    <button onclick="acknowledgeIncident('${inc.id}')" class="px-3 py-2.5 ${isAck ? 'bg-green-700' : 'bg-slate-800 hover:bg-green-700'} rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">
                        ${isAck ? '✓' : 'ACK'}
                    </button>
                    <button onclick="resolveIncident('${inc.id}')" class="px-3 py-2.5 bg-slate-800 hover:bg-green-700 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all" title="Mark as resolved and remove from active queue">
                        ✓ RESOLVE
                    </button>
                </div>`;

            const aiInfo = !isHandled ? `
                ${inc.recommended_units ? `<div class="text-[10px] font-bold uppercase tracking-wider text-cyan-400 mb-1">🚒 ${inc.recommended_units}</div>` : ''}
                ${inc.secondary_risks && inc.secondary_risks !== 'None' && inc.secondary_risks !== 'None detected' ? `<div class="text-[10px] font-bold uppercase tracking-wider text-orange-400 mb-1">⚠ ${inc.secondary_risks}</div>` : ''}
                ${inc.ai_reasoning ? `<div class="text-[10px] font-medium italic text-slate-500 mt-2 p-2 bg-slate-800/50 rounded-lg">"${inc.ai_reasoning}"</div>` : ''}
            ` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    ${sevBadge}
                    <span class="text-slate-500 font-bold text-[10px] uppercase">${timeAgo(inc.time)}</span>
                </div>
                <h2 class="text-lg font-black mb-0.5 uppercase tracking-tighter">${inc.type || 'Emergency'}</h2>
                <p class="${isGold ? 'text-amber-400' : isHandled ? 'text-green-400' : 'text-pink-400'} text-[10px] font-bold uppercase tracking-widest mb-2">${inc.summary || ''}</p>
                ${photo}
                ${videoPlayer}
                ${audioPlayer}
                <p class="text-slate-400 text-sm mb-3 leading-relaxed">${(inc.text || '').substring(0, 140)}${(inc.text || '').length > 140 ? '...' : ''}</p>
                ${aiInfo}
                <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold uppercase tracking-wider flex-wrap">
                    <span>📍 ${locationStr}</span>
                    ${inc.has_image ? '<span class="text-green-500">📷</span>' : ''}
                    ${inc.has_video ? '<span class="text-red-500">📹</span>' : ''}
                    ${inc.has_audio ? '<span class="text-blue-400">🎤</span>' : ''}
                    ${inc.verified ? '<span class="text-green-500">✅</span>' : ''}
                    ${isAck && !isHandled ? '<span class="text-green-400">ACK\'D</span>' : ''}
                </div>
                ${actions}
            `;
            return card;
        }

        function renderFiltered() {
            const incidents = filterIncidents();
            grid.innerHTML = '';
            liveCount.textContent = `${allIncidents.length} Active`;

            if (incidents.length === 0) {
                grid.innerHTML = `<div class="p-14 text-center text-slate-700 font-black uppercase tracking-widest border-4 border-dashed border-slate-900 rounded-[2rem] col-span-full">
                    <div class="text-4xl mb-4">📡</div>${allIncidents.length === 0 ? 'Waiting for signals...' : 'No matches'}</div>`;
                return;
            }

            incidents.forEach((inc, idx) => {
                grid.appendChild(renderCard(inc, { isTop: idx === 0 }));
            });
        }

        function renderHandled() {
            handledGrid.innerHTML = '';

            const count = resolvedIncidents.length;
            tabHandled.textContent = `✅ Resolved Cases (${count})`;

            if (count === 0) {
                handledGrid.innerHTML = `<div class="p-14 text-center text-slate-700 font-black uppercase tracking-widest border-4 border-dashed border-slate-900 rounded-[2rem] col-span-full">
                    <div class="text-4xl mb-4">📋</div>No resolved cases yet</div>`;
                return;
            }

            // Show latest resolved first
            [...resolvedIncidents].reverse().forEach(inc => {
                handledGrid.appendChild(renderCard(inc, { handled: true }));
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'active') {
                grid.classList.remove('hidden');
                handledGrid.classList.add('hidden');
                tabActive.className = 'px-5 py-2 bg-pink-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest transition-all';
                tabHandled.className = 'px-5 py-2 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black uppercase tracking-widest transition-all';
            } else {
                grid.classList.add('hidden');
                handledGrid.classList.remove('hidden');
                tabActive.className = 'px-5 py-2 bg-slate-800 text-slate-400 rounded-full text-[10px] font-black uppercase tracking-widest transition-all';
                tabHandled.className = 'px-5 py-2 bg-green-600 text-white rounded-full text-[10px] font-black uppercase tracking-widest transition-all';
                renderHandled();
            }
        }
        // Functions already bound to window at top of script


        searchBar.addEventListener('input', renderFiltered);
        filterSeverity.addEventListener('change', renderFiltered);
        filterType.addEventListener('change', renderFiltered);

        function handleNewData(data) {
            const newIncidents = data.incidents || [];
            const newResolved = data.resolved || [];
            const oldLen = allIncidents.length;
            
            if (newIncidents.length > oldLen) {
                const latest = newIncidents[0];
                addLog(`NEW EMERGENCY: ${latest.type} (SEV ${latest.severity})`, latest.severity >= 9 ? 'red-500' : 'pink-500');
                if (latest.severity >= 9) {
                    if (sirenEnabled) playSiren();
                    document.body.classList.add('bg-red-950');
                    setTimeout(() => document.body.classList.remove('bg-red-950'), 3000);
                }
            } else if (newIncidents.length < oldLen) {
                addLog("INCIDENT RESOLVED / CLEARED", "green-500");
            }
            
            allIncidents = newIncidents;
            resolvedIncidents = newResolved;
            updateStats(data);
            updateCharts();
            if (currentTab === 'active') renderFiltered();
            else renderHandled();
        }

        initCharts();

        function connectSSE() {
            const evtSource = new EventSource('/api/stream');
            evtSource.onopen = () => {
                connStatus.textContent = '● SSE Live';
                connStatus.className = 'text-green-500';
                addLog("CONNECTION ESTABLISHED: SSE DATA STREAM ACTIVE", "green-500");
            };
            evtSource.onmessage = (e) => {
                try { handleNewData(JSON.parse(e.data)); } catch (err) { }
            };
            evtSource.onerror = () => {
                connStatus.textContent = '● Polling';
                connStatus.className = 'text-yellow-500';
                evtSource.close();
                setInterval(pollFallback, 3000);
            };
        }

        async function pollFallback() {
            try {
                const res = await fetch('/api/feed');
                handleNewData(await res.json());
            } catch (e) { }
        }

        pollFallback().then(() => connectSSE());
    </script>
</body>
