<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstantDRS | Report Emergency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen">

    <header class="p-5 flex justify-between items-center border-b border-pink-200">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-pink-600 rounded-full animate-pulse"></div>
            <h1 class="font-black tracking-tighter text-2xl uppercase">Instant<span class="text-pink-600">DRS</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <a href="/authority" class="px-4 py-1 glass rounded-full text-[10px] font-bold tracking-widest uppercase hover:bg-pink-600 hover:text-white transition-all">
                🔐 Command Center
            </a>
            <button id="dark-mode-toggle" class="px-4 py-1 glass rounded-full text-[10px] font-bold tracking-widest uppercase hover:bg-pink-600 hover:text-white transition-all">
                🌙 DARK
            </button>
            <div id="battery-status" class="px-4 py-1 glass rounded-full text-[10px] font-bold tracking-widest uppercase">
                SYNCING...
            </div>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-6 flex flex-col gap-5">

        <div class="text-center pt-4 pb-2">
            <button id="activate-sos" class="sos-button">SOS</button>
            <p class="text-[9px] mt-3 text-slate-400 font-bold uppercase tracking-widest">Fill details below, then tap SOS</p>
        </div>

        <section class="glass rounded-3xl p-6 space-y-5">
            <h2 class="text-xs font-black text-pink-600 uppercase tracking-widest">Emergency Type</h2>
            <div id="type-grid" class="grid grid-cols-3 gap-3">
                <button data-type="Fire" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">🔥 Fire</button>
                <button data-type="Medical" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">🏥 Medical</button>
                <button data-type="Violence" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">⚠️ Violence</button>
                <button data-type="Flood" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">🌊 Flood</button>
                <button data-type="Accident" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">💥 Accident</button>
                <button data-type="Other" class="type-btn py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">📋 Other</button>
            </div>
        </section>

        <section class="glass rounded-3xl p-6 space-y-4">
            <h2 class="text-xs font-black text-pink-600 uppercase tracking-widest">Severity Level</h2>
            <div class="flex items-center gap-4">
                <input id="severity-slider" type="range" min="1" max="10" value="5" class="flex-1 accent-pink-600 h-2 rounded-full" />
                <span id="severity-value" class="text-2xl font-black text-pink-600 w-10 text-center">5</span>
            </div>
            <div class="flex justify-between text-[9px] text-slate-400 font-bold uppercase tracking-widest px-1">
                <span>Minor</span>
                <span>Moderate</span>
                <span>Critical</span>
            </div>
        </section>

        <section class="glass rounded-3xl p-6 space-y-4">
            <h2 class="text-xs font-black text-pink-600 uppercase tracking-widest">What is happening?</h2>
            <textarea
                id="emergency-text"
                placeholder="What's the situation? (e.g. '3 cars collided, one is leaking fuel, smoke visible')"
                class="w-full h-28 p-4 bg-white/30 rounded-2xl outline-none focus:ring-2 focus:ring-pink-600 transition-all text-sm placeholder:text-slate-400 resize-none"
            ></textarea>
        </section>

        <section class="glass rounded-3xl p-6 space-y-4">
            <h2 class="text-xs font-black text-pink-600 uppercase tracking-widest">📍 Location</h2>
            <div class="flex gap-3">
                <button id="gps-btn" class="flex-1 py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">
                    📍 Use GPS
                </button>
                <button id="manual-loc-btn" class="flex-1 py-3 glass rounded-2xl text-xs font-black uppercase tracking-wider hover:bg-pink-600 hover:text-white transition-all">
                    ✏️ Type Location
                </button>
            </div>
            <input id="location-input" type="text" placeholder="e.g. MG Road, Near City Mall, Bangalore"
                class="hidden w-full p-4 bg-white/30 rounded-2xl outline-none focus:ring-2 focus:ring-pink-600 text-sm placeholder:text-slate-400" />
            <div id="gps-status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></div>
        </section>

        <section class="glass rounded-3xl overflow-hidden">
            <button id="media-toggle" class="w-full py-4 px-6 flex justify-between items-center hover:bg-white/10 transition-colors">
                <span class="text-xs font-black uppercase tracking-widest text-slate-500">📸 Evidence Vault (Photo / Video / Voice)</span>
                <span id="chevron" class="text-xs transition-transform duration-300">▼</span>
            </button>
            <div id="media-controls" class="hidden p-6 space-y-4">
                <div id="camera-container" class="relative rounded-2xl overflow-hidden bg-black aspect-video shadow-inner">
                    <video id="camera-stream" autoplay playsinline muted class="w-full h-full object-cover opacity-80" style="transform: scaleX(-1);"></video>
                    <div id="recording-indicator" class="hidden absolute top-4 right-4 flex items-center gap-2 px-3 py-1 bg-red-600 rounded-full animate-pulse">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-white">REC</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button id="proof-btn" class="py-3 glass hover:bg-pink-600 hover:text-white rounded-2xl font-black text-xs uppercase tracking-wider transition-all">
                        📸 Photo
                    </button>
                    <button id="video-rec-btn" class="py-3 glass hover:bg-pink-600 hover:text-white rounded-2xl font-black text-xs uppercase tracking-wider transition-all">
                        📹 Video
                    </button>
                    <button id="voice-rec-btn" class="py-3 glass hover:bg-pink-600 hover:text-white rounded-2xl font-black text-xs uppercase tracking-wider transition-all">
                        🎤 Voice
                    </button>
                    <label class="py-3 glass hover:bg-pink-600 hover:text-white rounded-2xl font-black text-xs uppercase tracking-wider transition-all text-center cursor-pointer">
                        📁 Upload
                        <input type="file" id="file-upload" accept="image/*,video/*,audio/*" class="hidden" />
                    </label>
                </div>

                <div id="evidence-preview" class="hidden space-y-3">
                    <div id="image-preview" class="hidden"><img id="preview-img" class="w-full rounded-2xl border border-white/10" /></div>
                    <div id="video-preview" class="hidden"><video id="preview-video" controls class="w-full rounded-2xl border border-white/10"></video></div>
                    <div id="audio-preview" class="hidden"><audio id="preview-audio" controls class="w-full rounded-full border border-white/10"></audio></div>
                </div>
            </div>
        </section>

        <div class="flex gap-3">
            <button id="reset-form" class="flex-1 py-4 glass rounded-3xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:bg-slate-800 transition-all">
                🔄 Reset Form
            </button>
        </div>

        <div id="status-message" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center min-h-[1rem]"></div>

        <section class="glass rounded-3xl p-6 space-y-3">
            <h2 class="text-xs font-black text-pink-600 uppercase tracking-widest mb-2">🇮🇳 Emergency Helplines</h2>
            <div class="grid grid-cols-2 gap-2">
                <a href="tel:112" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">🚨</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Emergency</div><div class="font-black text-sm">112</div></div>
                </a>
                <a href="tel:100" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">👮</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Police</div><div class="font-black text-sm">100</div></div>
                </a>
                <a href="tel:108" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">🚑</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Ambulance</div><div class="font-black text-sm">108</div></div>
                </a>
                <a href="tel:101" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">🔥</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Fire Dept</div><div class="font-black text-sm">101</div></div>
                </a>
                <a href="tel:1098" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">👶</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Childline</div><div class="font-black text-sm">1098</div></div>
                </a>
                <a href="tel:1091" class="flex items-center gap-3 p-3 bg-white/20 rounded-2xl hover:bg-pink-600 hover:text-white transition-all">
                    <span class="text-lg">🙋‍♀️</span>
                    <div><div class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Women Help</div><div class="font-black text-sm">1091</div></div>
                </a>
            </div>
        </section>
    </main>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
        const activateBtn = document.getElementById('activate-sos');
        const mediaToggle = document.getElementById('media-toggle');
        const mediaControls = document.getElementById('media-controls');
        const chevron = document.getElementById('chevron');
        const emergencyText = document.getElementById('emergency-text');
        const video = document.getElementById('camera-stream');
        const canvas = document.getElementById('capture-canvas');
        const proofBtn = document.getElementById('proof-btn');
        const fileUpload = document.getElementById('file-upload');
        const statusMsg = document.getElementById('status-message');
        const batteryStatus = document.getElementById('battery-status');
        const gpsBtn = document.getElementById('gps-btn');
        const manualLocBtn = document.getElementById('manual-loc-btn');
        const locationInput = document.getElementById('location-input');
        const gpsStatus = document.getElementById('gps-status');
        const previewImg = document.getElementById('preview-img');
        const imagePreview = document.getElementById('image-preview');
        const videoPreview = document.getElementById('video-preview');
        const previewVideo = document.getElementById('preview-video');
        const audioPreview = document.getElementById('audio-preview');
        const previewAudio = document.getElementById('preview-audio');
        const videoRecBtn = document.getElementById('video-rec-btn');
        const voiceRecBtn = document.getElementById('voice-rec-btn');
        const recordingIndicator = document.getElementById('recording-indicator');
        const resetBtn = document.getElementById('reset-form');

        let currentImageB64 = null;
        let currentVideoB64 = null;
        let currentAudioB64 = null;
        let locationData = { lat: 0, lng: 0, text: '' };
        let mediaStream = null;
        let selectedType = '';
        let selectedSeverity = 5;
        let mediaRecorder = null;
        let chunks = [];
        let isRecordingVideo = false;
        let isRecordingVoice = false;

        document.getElementById('severity-slider').addEventListener('input', (e) => {
            selectedSeverity = parseInt(e.target.value);
            document.getElementById('severity-value').textContent = selectedSeverity;
        });

        // DARK MODE
        const darkBtn = document.getElementById('dark-mode-toggle');
        const setDarkMode = (isDark) => {
            document.body.classList.toggle('dark', isDark);
            darkBtn.textContent = isDark ? '☀️ LIGHT' : '🌙 DARK';
            localStorage.setItem('darkMode', isDark);
        };
        darkBtn.addEventListener('click', () => setDarkMode(!document.body.classList.contains('dark')));
        if (localStorage.getItem('darkMode') === 'true') setDarkMode(true);

        // TYPE SELECTOR
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (selectedType === btn.dataset.type) {
                    btn.classList.remove('bg-pink-600', 'text-white');
                    selectedType = '';
                } else {
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-pink-600', 'text-white'));
                    btn.classList.add('bg-pink-600', 'text-white');
                    selectedType = btn.dataset.type;
                }
            });
        });

        // BATTERY
        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                const check = () => {
                    const level = Math.round(battery.level * 100);
                    batteryStatus.textContent = `BAT: ${level}%`;
                    document.body.classList.toggle('low-power', battery.level < 0.15);
                };
                check();
                battery.addEventListener('levelchange', check);
            });
        }

        // GPS
        gpsBtn.addEventListener('click', () => {
            gpsStatus.textContent = "ACQUIRING GPS...";
            gpsBtn.classList.add('bg-pink-600', 'text-white');
            manualLocBtn.classList.remove('bg-pink-600', 'text-white');
            locationInput.classList.add('hidden');
            navigator.geolocation.getCurrentPosition(
                pos => {
                    locationData.lat = pos.coords.latitude;
                    locationData.lng = pos.coords.longitude;
                    gpsStatus.textContent = `GPS LOCKED: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
                },
                err => { gpsStatus.textContent = "GPS FAILED — TYPE LOCATION MANUALLY"; }
            );
        });

        manualLocBtn.addEventListener('click', () => {
            locationInput.classList.remove('hidden');
            locationInput.focus();
            manualLocBtn.classList.add('bg-pink-600', 'text-white');
            gpsBtn.classList.remove('bg-pink-600', 'text-white');
            gpsStatus.textContent = '';
        });

        locationInput.addEventListener('input', () => { locationData.text = locationInput.value; });

        // MEDIA
        mediaToggle.addEventListener('click', async () => {
            const isHidden = mediaControls.classList.contains('hidden');
            mediaControls.classList.toggle('hidden');
            chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
            if (isHidden && !mediaStream) {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = mediaStream;
                    video.classList.remove('hidden');
                } catch (e) { statusMsg.textContent = "CAMERA ACCESS DENIED"; }
            }
        });

        // MEDIA RECORDING
        async function startRecording(mode) {
            chunks = [];
            const stream = mode === 'video' ? mediaStream : await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: mode === 'video' ? 'video/mp4' : 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    const b64 = reader.result.split(',')[1];
                    if (mode === 'video') {
                        currentVideoB64 = b64;
                        previewVideo.src = URL.createObjectURL(blob);
                        videoPreview.classList.remove('hidden');
                        document.getElementById('evidence-preview').classList.remove('hidden');
                        statusMsg.textContent = "VIDEO CAPTURED ✓";
                    } else {
                        currentAudioB64 = b64;
                        previewAudio.src = URL.createObjectURL(blob);
                        audioPreview.classList.remove('hidden');
                        document.getElementById('evidence-preview').classList.remove('hidden');
                        statusMsg.textContent = "VOICE CAPTURED ✓";
                    }
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
        }

        videoRecBtn.addEventListener('click', () => {
            if (!isRecordingVideo) {
                if (!mediaStream) return;
                startRecording('video');
                isRecordingVideo = true;
                videoRecBtn.textContent = "⏹ Stop Video";
                videoRecBtn.classList.add('bg-red-600', 'text-white');
                recordingIndicator.classList.remove('hidden');
            } else {
                mediaRecorder.stop();
                isRecordingVideo = false;
                videoRecBtn.textContent = "📹 Video";
                videoRecBtn.classList.remove('bg-red-600', 'text-white');
                recordingIndicator.classList.add('hidden');
            }
        });

        voiceRecBtn.addEventListener('click', async () => {
            if (!isRecordingVoice) {
                await startRecording('voice');
                isRecordingVoice = true;
                voiceRecBtn.textContent = "⏹ Stop Voice";
                voiceRecBtn.classList.add('bg-red-600', 'text-white');
            } else {
                mediaRecorder.stop();
                isRecordingVoice = false;
                voiceRecBtn.textContent = "🎤 Voice";
                voiceRecBtn.classList.remove('bg-red-600', 'text-white');
            }
        });

        resetBtn.addEventListener('click', () => {
            emergencyText.value = '';
            locationInput.value = '';
            locationData = { lat: 0, lng: 0, text: '' };
            currentImageB64 = null;
            currentVideoB64 = null;
            currentAudioB64 = null;
            selectedType = '';
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-pink-600', 'text-white'));
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('video-preview').classList.add('hidden');
            document.getElementById('audio-preview').classList.add('hidden');
            document.getElementById('evidence-preview').classList.add('hidden');
            gpsStatus.textContent = '';
            statusMsg.textContent = "FORM RESET";
            gpsBtn.classList.remove('bg-pink-600', 'text-white');
            manualLocBtn.classList.remove('bg-pink-600', 'text-white');
            locationInput.classList.add('hidden');
        });

        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const b64 = ev.target.result.split(',')[1];
                if (file.type.startsWith('image/')) {
                    currentImageB64 = b64;
                    previewImg.src = ev.target.result;
                    imagePreview.classList.remove('hidden');
                } else if (file.type.startsWith('video/')) {
                    currentVideoB64 = b64;
                    previewVideo.src = ev.target.result;
                    videoPreview.classList.remove('hidden');
                } else if (file.type.startsWith('audio/')) {
                    currentAudioB64 = b64;
                    previewAudio.src = ev.target.result;
                    audioPreview.classList.remove('hidden');
                }
                document.getElementById('evidence-preview').classList.remove('hidden');
                statusMsg.textContent = "FILE UPLOADED ✓";
            };
            reader.readAsDataURL(file);
        });

        // SOS SUBMIT
        activateBtn.addEventListener('click', async () => {
            if (activateBtn.disabled) return;

            if (!selectedType) { statusMsg.textContent = "⚠ SELECT EMERGENCY TYPE"; return; }
            const text = emergencyText.value.trim();
            if (!text) { statusMsg.textContent = "⚠ DESCRIBE THE EMERGENCY"; return; }
            if (locationData.lat === 0 && locationData.lng === 0 && !locationData.text) {
                statusMsg.textContent = "⚠ PROVIDE LOCATION (GPS or Manual)"; return;
            }

            activateBtn.disabled = true;
            activateBtn.innerHTML = `
                <div class="flex items-center justify-center gap-3">
                    <div class="w-5 h-5 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
                    TRIAGING...
                </div>
            `;
            statusMsg.textContent = "AI ANALYZING EMERGENCY...";

            const payload = {
                text: text,
                emergency_type: selectedType,
                severity: selectedSeverity,
                image_b64: currentImageB64,
                video_b64: currentVideoB64,
                audio_b64: currentAudioB64,
                lat: locationData.lat,
                lng: locationData.lng,
                location_text: locationData.text || (locationData.lat !== 0 ? `${locationData.lat}, ${locationData.lng}` : ''),
                time: Math.floor(Date.now() / 1000)
            };

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);
                const response = await fetch('/triage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeout);
                if (response.ok) {
                    const result = await response.json();
                    sessionStorage.setItem('triage_result', JSON.stringify(result));
                    window.location.href = '/submitted.html';
                } else { throw new Error(); }
            } catch (e) {
                statusMsg.textContent = "OFFLINE — SAVED LOCALLY";
                try {
                    const req = indexedDB.open("InstantDRSVault", 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore("sos", { autoIncrement: true });
                    req.onsuccess = e => {
                        const tx = e.target.result.transaction("sos", "readwrite");
                        tx.objectStore("sos").add(payload);
                    };
                } catch(x) {}
                activateBtn.textContent = "RETRY";
                activateBtn.disabled = false;
            }
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/service-worker.js');
        }

        async function drainOfflineVault() {
            try {
                const req = indexedDB.open("InstantDRSVault", 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore("sos", { autoIncrement: true });
                req.onsuccess = async (e) => {
                    const db = e.target.result;
                    const tx = db.transaction("sos", "readwrite");
                    const store = tx.objectStore("sos");
                    const getAll = store.getAll();
                    getAll.onsuccess = async () => {
                        const items = getAll.result;
                        if (items.length === 0) return;
                        for (const payload of items) {
                            try {
                                await fetch('/triage', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(payload)
                                });
                            } catch(err) { return; }
                        }
                        const clearTx = db.transaction("sos", "readwrite");
                        clearTx.objectStore("sos").clear();
                    };
                };
            } catch(e) {}
        }

        window.addEventListener('online', drainOfflineVault);
        drainOfflineVault();
    </script>
</body>
</html>
