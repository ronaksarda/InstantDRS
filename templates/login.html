<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstantDRS | Authority Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-6 transition-colors duration-500">
    <script>
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    </script>
    
    <form method="POST" class="w-full max-w-sm mx-auto p-10 glass rounded-[2.5rem] border-2 border-white/5 space-y-8 text-center shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-pink-600/10 blur-[80px] rounded-full"></div>
        
        <div class="space-y-4">
            <div class="w-20 h-20 mx-auto bg-pink-600/20 rounded-full flex items-center justify-center text-3xl shadow-inner">🔐</div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Command <span class="text-pink-600">Center</span></h1>
            <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">Authorized Personnel Only</p>
        </div>

        {% if error %}
        <div class="px-4 py-3 bg-red-600/20 border border-red-600/50 text-red-400 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-shake">
            ⚠️ Authentication Failed
        </div>
        {% endif %}

        <div class="space-y-3">
            <div class="text-left">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1 block">Operator ID</label>
                <input type="text" name="username" placeholder="Username (e.g. admin)" autofocus required
                    class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl text-center text-sm font-bold text-white outline-none focus:ring-2 focus:ring-pink-600 focus:bg-white/10 transition-all placeholder:text-slate-700" />
            </div>
            
            <div class="text-left">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-1 block">Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl text-center text-lg font-black text-white outline-none focus:ring-2 focus:ring-pink-600 focus:bg-white/10 transition-all placeholder:text-slate-700" />
            </div>
        </div>

        <button type="submit" class="w-full py-4 bg-pink-600 hover:bg-pink-700 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all shadow-lg shadow-pink-600/20 active:scale-95">
            Login to Dashboard
        </button>
        
        <div class="pt-4 border-t border-white/5">
            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest mb-1">Demo Access Credentials</p>
            <div class="inline-flex gap-2 text-[10px] bg-white/5 px-4 py-2 rounded-full border border-white/5">
                <span class="text-slate-500">ID: <span class="text-pink-500 font-black">admin</span></span>
                <span class="text-slate-800">|</span>
                <span class="text-slate-500">KEY: <span class="text-pink-500 font-black">Check .env file</span></span>
            </div>
        </div>
    </form>

    <style>
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        body.dark .text-white { color: #f1f5f9 !important; }
        body.dark .bg-slate-950 { background-color: #0f172a !important; }
    </style>
</body>
</html>
